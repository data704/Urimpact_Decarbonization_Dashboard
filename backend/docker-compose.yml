services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: urimpact-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: urimpact
      POSTGRES_PASSWORD: urimpact_password
      POSTGRES_DB: urimpact
    ports:
      - "5433:5432"  # Using 5433 externally to avoid conflict with local PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urimpact -d urimpact"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urimpact-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: urimpact-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urimpact-network

  # pgAdmin - Database Management UI (Optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: urimpact-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@urimpact.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - urimpact-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  urimpact-network:
    driver: bridge

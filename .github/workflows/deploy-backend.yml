name: Deploy URIMPACT Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: carbonemission-backend

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get short commit SHA
        id: commit
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Copy Dockerfile and entrypoint into backend
        run: |
          cp Dockerfile backend/
          cp entrypoint.sh backend/

      - name: Build Docker image
        working-directory: ./backend
        run: |
          docker build -t 725948481931.dkr.ecr.eu-central-1.amazonaws.com/carbonemission-backend:${{ steps.commit.outputs.sha }} .
          docker tag 725948481931.dkr.ecr.eu-central-1.amazonaws.com/carbonemission-backend:${{ steps.commit.outputs.sha }} \
                     725948481931.dkr.ecr.eu-central-1.amazonaws.com/carbonemission-backend:latest

      - name: Push Docker image to ECR
        run: |
          docker push 725948481931.dkr.ecr.eu-central-1.amazonaws.com/carbonemission-backend:${{ steps.commit.outputs.sha }}
          docker push 725948481931.dkr.ecr.eu-central-1.amazonaws.com/carbonemission-backend:latest

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            IMAGE_REPO="725948481931.dkr.ecr.eu-central-1.amazonaws.com/carbonemission-backend"
            IMAGE_TAG="latest"
            IMAGE="${IMAGE_REPO}:${IMAGE_TAG}"
            MIN_FREE_KB=2097152 # 2GB

            print_disk() {
              echo "💽 Disk usage:"
              df -h /
            }

            ensure_disk_space() {
              local free_kb
              free_kb=$(df -Pk / | awk 'NR==2 {print $4}')
              if [ "$free_kb" -lt "$MIN_FREE_KB" ]; then
                echo "⚠️ Low disk space detected (<2GB). Running Docker cleanup..."
                docker container prune -f || true
                docker image prune -af || true
                docker builder prune -af || true
                docker volume prune -f || true
                # Optional host log cleanup; safe no-op if unavailable
                sudo journalctl --vacuum-time=3d >/dev/null 2>&1 || true
              fi

              free_kb=$(df -Pk / | awk 'NR==2 {print $4}')
              if [ "$free_kb" -lt "$MIN_FREE_KB" ]; then
                echo "❌ Not enough disk space after cleanup. Need >= 2GB free."
                print_disk
                exit 1
              fi
            }

            echo "🔐 Login to ECR"
            aws ecr get-login-password --region eu-central-1 | \
              docker login -u AWS --password-stdin 725948481931.dkr.ecr.eu-central-1.amazonaws.com

            print_disk
            ensure_disk_space

            echo "📥 Pull image"
            docker pull "$IMAGE"

            echo "🛑 Stop old container"
            docker stop carbonemission-backend || true
            docker rm carbonemission-backend || true

            # Remove dangling/old layers before next run to avoid disk exhaustion.
            docker image prune -af || true
            docker builder prune -af || true

            echo "🔑 Fetch secrets from AWS Secrets Manager"
            export DATABASE_URL=$(aws secretsmanager get-secret-value \
              --secret-id urimpact/database-url \
              --region eu-central-1 \
              --query SecretString \
              --output text)

            export JWT_SECRET=$(aws secretsmanager get-secret-value \
              --secret-id urimpact/jwt-secret \
              --region eu-central-1 \
              --query SecretString \
              --output text)

            export ANTHROPIC_API_KEY=$(aws secretsmanager get-secret-value \
              --secret-id urimpact/anthropic-api-key \
              --region eu-central-1 \
              --query SecretString \
              --output text)

            export CLIMATIQ_API_KEY=$(aws secretsmanager get-secret-value \
              --secret-id urimpact/climatiq-api-key \
              --region eu-central-1 \
              --query SecretString \
              --output text)

            echo "🚀 Start new container"
            docker run -d \
              --name carbonemission-backend \
              --restart always \
              -p 5000:5000 \
              -e NODE_ENV=production \
              -e PORT=5000 \
              -e AWS_REGION=eu-central-1 \
              -e DATABASE_URL="$DATABASE_URL" \
              -e JWT_SECRET="$JWT_SECRET" \
              -e ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
              -e CLIMATIQ_API_KEY="$CLIMATIQ_API_KEY" \
              -e CORS_ORIGIN="${{ secrets.CORS_ORIGIN }}" \
              -e REDIS_HOST="${{ secrets.REDIS_HOST }}" \
              -e UPLOADS_S3_BUCKET="${{ secrets.UPLOADS_S3_BUCKET }}" \
              "$IMAGE"

            echo "⏳ Waiting for health check"
            sleep 10

            for i in {1..30}; do
              if curl -f http://localhost:5000/api/health > /dev/null 2>&1; then
                echo "✅ Health check passed!"
                exit 0
              fi
              echo "Health check $i/30..."
              sleep 2
            done

            echo "❌ Health check failed"
            docker logs carbonemission-backend --tail 50
            exit 1